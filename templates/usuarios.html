<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listado de usuarios</title>
</head>
<body>
    <div class="container">
        <header><h1>Listado de usuarios</h1></header>
        <main>
            <div class="opciones">
                <button><a href="/usuarios/crear">Ingresar nuevo usuario</a></button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Mail</th>
                        <th>Rol</th>
                        <th>Comunicarse</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {% for usuario in usuarios%}
                        <tr>
                            <td>{{usuario.nombre}}</td>
                            <td>{{usuario.email}}</td>
                            <td>{{usuario.rol}}</td>
                            <td><a href="mailto:{{usuario.email}}">Correo electrónico</a></td>
                            <td>
                                <a href="/usuarios/editar/{{usuario.idusuarios}}">Editar</a>
                                <a href="/usuarios/eliminar/{{usuario.idusuarios}}">Eliminar</a>
                            </td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </main>
    </div>
</body>
</html>
