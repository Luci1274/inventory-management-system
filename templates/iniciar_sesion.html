<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesion</title>
</head>
<body>
    <div class="container">
        <header>
            <h1>Iniciar sesión</h1>
        </header>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div style="color: red; margin-bottom: 15px; font-weight: bold;">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="" method="POST">
            <label for="nombre_usuario">Ingrese el nombre de su usuario</label>
            <input type="text" name="nombre_usuario" id="nombre_usuario" placeholder="Ingrese su nombre de usuario" required>
            <br>

            <label for="contraseña_usuario">Ingrese su contraseña</label>
            <input type="password" name="contraseña_usuario" id="contraseña_usuario" placeholder="Ingrese su contraseña" required>
            <br>
            <button type="submit">Iniciar sesión</button>
        </form>
    </div>
</body>
</html>
